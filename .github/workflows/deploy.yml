name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY_URL: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        run: |
          set -e
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --heads "$REPOSITORY_URL" gh-pages; then
            git clone --depth 1 --branch gh-pages "$REPOSITORY_URL" gh-pages
            cd gh-pages
            git rm -rf . || true
          else
            git clone "$REPOSITORY_URL" gh-pages
            cd gh-pages
            git checkout --orphan gh-pages
            git rm -rf . || true
          fi
          cp -r ../dist/* .
          git add --all
          git commit -m "Deploy site from GitHub Actions" || true
          git push --force "$REPOSITORY_URL" gh-pages
